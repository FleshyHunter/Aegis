name: aegis

services:

  mongo:
    image: mongo:7
    container_name: aegis-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: AEGIS

  api:
    build:
      context: ./aegis/BackEnd
      dockerfile: docker/Dockerfile.node
    container_name: aegis-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/AEGIS
      PYTHON_BIN: /usr/bin/python3
      USE_MOCK_LLM: ${USE_MOCK_LLM:-false}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-}

      DIFY_ROUTING_API_KEY: ${DIFY_ROUTING_API_KEY:-}
      DIFY_EVALUATION_API_KEY: ${DIFY_EVALUATION_API_KEY:-}

      DIFY_TIMEOUT_SECONDS: ${DIFY_TIMEOUT_SECONDS:-60}
      DIFY_RESPONSE_MODE: ${DIFY_RESPONSE_MODE:-blocking}
      DIFY_USER: ${DIFY_USER:-aegis}
      MAX_EVALUATION_CANDIDATES: ${MAX_EVALUATION_CANDIDATES:-2}
      MAX_PARALLEL_TICKETS: ${MAX_PARALLEL_TICKETS:-5}
      MAX_DIFY_RPM: ${MAX_DIFY_RPM:-60}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      NODE_ENV: production
    depends_on:
      - mongo
    

  frontend:
    build:
      context: ./aegis/FrontEnd
      dockerfile: Dockerfile
    container_name: aegis-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mongo-data:
